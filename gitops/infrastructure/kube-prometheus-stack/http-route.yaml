apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-dashboard-route
  namespace: monitoring
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-api
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
  - grafana.home
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: kube-prometheus-stack-grafana
      port: 80
      weight: 1	
    matches:	
      - path:	
          type: PathPrefix	
          value: /
