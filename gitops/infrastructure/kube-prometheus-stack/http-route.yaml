apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-dashboard-route
  namespace: monitoring
spec:
  parentRefs:
  - name: gateway-api
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
  - grafana.home
  rules:
  - backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 80