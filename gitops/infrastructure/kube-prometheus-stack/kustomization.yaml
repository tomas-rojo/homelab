apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - http-route.yaml

helmCharts:
  - name: kube-prometheus-stack
    version: 84.0.1
    repo: "https://prometheus-community.github.io/helm-charts"
    releaseName: kube-prometheus-stack
    namespace: monitoring
    valuesFile: values.yaml
