crds:
  enabled: true
upgradeJob:
  enabled: true
  forceConflicts: true
grafana:
  defaultDashboardsTimezone: Europe/Amsterdam
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
  admin:
    existingSecret: grafana-admin-credentials
    passwordKey: admin-password