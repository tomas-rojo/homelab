crds:
  enabled: true
upgradeJob:
  enabled: true
  forceConflicts: true
grafana:
  defaultDashboardsTimezone: Europe/Amsterdam
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
kubelet:
  serviceMonitor:
    cAdvisor: true
    cAdvisorRelabelings:
      - sourceLabels: [job]
        targetLabel: job
        replacement: kubernetes-cadvisor
      - action: replace
        targetLabel: metrics_path
        replacement: /metrics/cadvisor