apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage-route
  namespace: homepage
spec:
  parentRefs:
  - name: gateway-api
    namespace: envoy-gateway-system
    sectionName: https
  hostnames:
  - homepage.home
  rules:
  - backendRefs:
    - name: homepage
      port: 3000